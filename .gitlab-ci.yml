include:
  - project: "signageos/infra/gitlab-ci"
    file: "/pipelines/.ts-project.yaml"
    ref: master
    inputs:
      disable-checktypes: false
      disable-prettier: false
      disable-vulnerability-checks: true
  - project: "signageos/infra/gitlab-ci"
    file: "/templates/release.yml"
    ref: master

variables:
  SOPS_VERSION: "3.9.4"
  BUILD_TARGET: "compile"

# ---------------------------------------------------------------------------
# Build & Package VSIX
# ---------------------------------------------------------------------------
build:package:
  stage: build
  image: $ECR_REGISTRY/signageos/infra/gitlab-ci:master
  tags:
    - large
  script:
    - docker-gitlabci-run npm install --ignore-scripts
    - update-package-version "$(get-version)"
    - docker-gitlabci-run npm run compile
    - docker-gitlabci-run npx vsce package -o vscode-terraform-ui.vsix
  artifacts:
    paths:
      - vscode-terraform-ui.vsix
    expire_in: 1 week
  needs:
    - job: runtime:build
      optional: true

# ---------------------------------------------------------------------------
# Publish to VS Code Marketplace & Open VSX (only on tags)
# ---------------------------------------------------------------------------
.install-sops:
  before_script:
    - >
      curl -fsSL "https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.amd64"
      -o /usr/local/bin/sops && chmod +x /usr/local/bin/sops

publish:vsce:
  stage: build
  extends: .install-sops
  image: $ECR_REGISTRY/signageos/infra/gitlab-ci:master
  tags:
    - small
  rules:
    - if: "$CI_COMMIT_TAG"
  script:
    - docker-gitlabci-run npm install --ignore-scripts
    - update-package-version "$(get-version)"
    - docker-gitlabci-run npm run compile
    - npm run vsce:publish
  needs:
    - build:package

publish:ovsx:
  stage: build
  extends: .install-sops
  image: $ECR_REGISTRY/signageos/infra/gitlab-ci:master
  tags:
    - small
  rules:
    - if: "$CI_COMMIT_TAG"
  script:
    - docker-gitlabci-run npm install --ignore-scripts
    - update-package-version "$(get-version)"
    - docker-gitlabci-run npm run compile
    - npm run ovsx:publish
  needs:
    - build:package
  allow_failure: true

# ---------------------------------------------------------------------------
# Release — reuse standard signageOS release tooling
# ---------------------------------------------------------------------------
release:tag-new-version:
  extends: .release:tag-new-version
  needs:
    - build:package

release:tag-new-version:beta:
  extends: .release:tag-new-version:beta
  needs:
    - build:package

release:tag-new-version:rc:
  extends: .release:tag-new-version:rc
  needs:
    - build:package

release:publish-release-notes:
  extends: .release:publish-release-notes
  needs:
    - build:package
