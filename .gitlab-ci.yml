stages:
  - build
  - publish
  - release

variables:
  NODE_VERSION: "20"

# ---------------------------------------------------------------------------
# Build
# ---------------------------------------------------------------------------
build:
  stage: build
  image: node:${NODE_VERSION}
  script:
    - npm ci --ignore-scripts
    - npm run compile
    - npx vsce package -o vscode-terraform-ui.vsix
  artifacts:
    paths:
      - vscode-terraform-ui.vsix
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

# ---------------------------------------------------------------------------
# Publish to VS Code Marketplace & Open VSX (only on tags)
# ---------------------------------------------------------------------------
publish:vsce:
  stage: publish
  image: node:${NODE_VERSION}
  needs:
    - build
  script:
    - npm ci --ignore-scripts
    - npx vsce publish --packagePath vscode-terraform-ui.vsix -p "${VSCE_PAT}"
  rules:
    - if: $CI_COMMIT_TAG

publish:ovsx:
  stage: publish
  image: node:${NODE_VERSION}
  needs:
    - build
  script:
    - npm ci --ignore-scripts
    - npx ovsx publish vscode-terraform-ui.vsix -p "${OVSX_TOKEN}"
  rules:
    - if: $CI_COMMIT_TAG
  allow_failure: true

# ---------------------------------------------------------------------------
# Release — manual tag creation on default branch
# ---------------------------------------------------------------------------
release:tag:
  stage: release
  image: node:${NODE_VERSION}
  script:
    - apt-get update -qq && apt-get install -y -qq jq > /dev/null
    - VERSION=$(node -p "require('./package.json').version")
    - echo "Tagging v${VERSION}"
    - git config user.email "ci@signageos.io"
    - git config user.name "GitLab CI"
    - git tag -a "v${VERSION}" -m "Release v${VERSION}"
    - git push "https://${CI_REPOSITORY_PUSH_USERNAME}:${CI_REPOSITORY_PUSH_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" "v${VERSION}"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
  needs:
    - build

release:notes:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  script:
    - echo "Creating release for ${CI_COMMIT_TAG}"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "$CI_COMMIT_TAG"
    description: "Release $CI_COMMIT_TAG — see CHANGELOG.md for details."
  rules:
    - if: $CI_COMMIT_TAG
