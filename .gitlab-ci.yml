stages:
  - build
  - publish
  - release

variables:
  NODE_VERSION: "20"
  SOPS_VERSION: "3.9.4"

.install-sops: &install-sops
  - >
    curl -fsSL "https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.amd64"
    -o /usr/local/bin/sops && chmod +x /usr/local/bin/sops

# ---------------------------------------------------------------------------
# Build
# ---------------------------------------------------------------------------
build:
  stage: build
  image: node:${NODE_VERSION}
  script:
    - npm ci --ignore-scripts
    - npm run compile
    - npx vsce package -o vscode-terraform-ui.vsix
  artifacts:
    paths:
      - vscode-terraform-ui.vsix
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

# ---------------------------------------------------------------------------
# Publish to VS Code Marketplace & Open VSX (only on tags)
# ---------------------------------------------------------------------------
publish:vsce:
  stage: publish
  image: node:${NODE_VERSION}
  needs:
    - build
  script:
    - *install-sops
    - npm ci --ignore-scripts
    - npm run vsce:publish
  rules:
    - if: $CI_COMMIT_TAG

publish:ovsx:
  stage: publish
  image: node:${NODE_VERSION}
  needs:
    - build
  script:
    - *install-sops
    - npm ci --ignore-scripts
    - npm run ovsx:publish
  rules:
    - if: $CI_COMMIT_TAG
  allow_failure: true

# ---------------------------------------------------------------------------
# Release — bump patch version, commit, tag, and push
# ---------------------------------------------------------------------------
release:tag:
  stage: release
  image: node:${NODE_VERSION}
  script:
    - apt-get update -qq && apt-get install -y -qq git > /dev/null
    - CURRENT=$(node -p "require('./package.json').version")
    - 'IFS=. read -r MAJOR MINOR PATCH <<< "$CURRENT"'
    - NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
    - echo "Bumping ${CURRENT} → ${NEXT}"
    - npm version "${NEXT}" --no-git-tag-version
    # Update CHANGELOG — rename [Unreleased] to [X.Y.Z] and add new [Unreleased]
    - sed -i "s/## \[Unreleased\]/## [Unreleased]\n\n## [${NEXT}]/" CHANGELOG.md
    - git config user.email "ci@signageos.io"
    - git config user.name "GitLab CI"
    - PUSH_URL="https://${CI_REPOSITORY_PUSH_USERNAME}:${CI_REPOSITORY_PUSH_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
    - git add package.json package-lock.json CHANGELOG.md
    - git commit -m "Bump ${NEXT}"
    - git tag -a "v${NEXT}" -m "Release v${NEXT}"
    - git push "${PUSH_URL}" HEAD:${CI_DEFAULT_BRANCH}
    - git push "${PUSH_URL}" "v${NEXT}"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
  needs:
    - build

release:notes:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  script:
    - echo "Creating release for ${CI_COMMIT_TAG}"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "$CI_COMMIT_TAG"
    description: "Release $CI_COMMIT_TAG — see CHANGELOG.md for details."
  rules:
    - if: $CI_COMMIT_TAG
