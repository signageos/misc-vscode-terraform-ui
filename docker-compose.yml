services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
            cache_from: ['172396373649.dkr.ecr.eu-central-1.amazonaws.com/signageos/misc/vscode-terraform-ui/runtime:latest']
            target: dev
            tags: ['172396373649.dkr.ecr.eu-central-1.amazonaws.com/signageos/misc/vscode-terraform-ui/runtime:latest']
        volumes:
            - .:/app
        working_dir: /app
        env_file:
            - ~/.signageos/npm.env
        command: tail -f /dev/null
